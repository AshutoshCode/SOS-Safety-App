name: silent_emergency_alert
description: Silent emergency alert system - trigger SOS without unlocking phone.
version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ^3.19.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^5.4.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^14.0.0

  # State Management & DI
  provider: ^7.1.0
  get_it: ^7.8.0

  # Location & Maps
  geolocator: ^12.1.0
  google_maps_flutter: ^3.0.0

  # Audio & Sensors
  record: ^5.1.0
  shake: ^2.1.0

  # Background Services
  workmanager: ^0.5.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Utils
  permission_handler: ^11.4.0
  logger: ^2.3.0
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  go_router: ^14.0.0
  intl: ^0.19.0
  uuid: ^4.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
